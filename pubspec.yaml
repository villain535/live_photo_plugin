name: live_photo_plugin
description: "A Flutter plugin for saving mp4 as Live Photo on iOS."
version: 0.0.1
homepage: https://github.com/villain535/live_photo_plugin

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: LivePhotoPlugin